{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#2563eb,#06b6d4);

        }

        .forgot-card{

            width:100%;
            max-width:470px;

            background:rgba(255,255,255,.12);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:45px;

            color:white;

            box-shadow:0 15px 35px rgba(0,0,0,.2);

        }

        .icon{

            width:90px;
            height:90px;

            background:white;

            color:#2563eb;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            margin:auto;

            font-size:45px;

        }

        h2{

            text-align:center;
            margin-top:20px;
            font-weight:bold;

        }

        p{

            text-align:center;
            opacity:.9;
            margin-bottom:30px;

        }

        .form-control{

            height:50px;

            border-radius:10px;

        }

        .btn-reset{

            width:100%;

            height:50px;

            border:none;

            border-radius:10px;

            background:#0d6efd;

            color:white;

            font-weight:bold;

            transition:.3s;

        }

        .btn-reset:hover{

            background:#084298;

        }

        a{

            color:#ffd54f;

            text-decoration:none;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="forgot-card">

<div class="icon">

<i class="bi bi-shield-lock-fill"></i>

</div>

<h2>

Forgot Password

</h2>

<p>

Enter your registered email to reset your password.

</p>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

{% if success %}

<div class="alert alert-success">

{{ success }}

</div>

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="mb-2">

Email Address

</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Registered Email"
required>

</div>

<button
type="submit"
class="btn-reset">

<i class="bi bi-envelope-fill"></i>

Continue

</button>

</form>

<hr>

<div class="text-center">

Remember Password?

<a href="{% url 'login' %}">

Login Here

</a>

</div>

</div>

</body>

</html>
