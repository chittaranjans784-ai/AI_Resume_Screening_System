{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>

        {% block title %}
        Admin Login
        {% endblock %}

    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;

        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

            overflow:hidden;

            position:relative;

        }

        body::before{

            content:"";

            position:absolute;

            width:500px;

            height:500px;

            border-radius:50%;

            background:rgba(255,255,255,.08);

            top:-180px;

            left:-180px;

        }

        body::after{

            content:"";

            position:absolute;

            width:400px;

            height:400px;

            border-radius:50%;

            background:rgba(255,255,255,.05);

            bottom:-150px;

            right:-150px;

        }

        .login-wrapper{

            width:100%;

            max-width:460px;

            position:relative;

            z-index:10;

            padding:20px;

        }

        .login-card{

            background:rgba(255,255,255,.96);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:40px;

            box-shadow:0 20px 50px rgba(0,0,0,.25);

        }

        .logo{

            width:80px;

            height:80px;

            margin:auto;

            border-radius:50%;

            background:#0d6efd;

            color:#fff;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:34px;

            margin-bottom:20px;

        }

        .login-title{

            text-align:center;

            font-size:28px;

            font-weight:700;

            color:#0f172a;

        }

        .login-subtitle{

            text-align:center;

            color:#6c757d;

            margin-bottom:30px;

        }

        .form-control{

            height:52px;

            border-radius:12px;

        }

        .btn-login{

            height:52px;

            border-radius:12px;

            font-size:17px;

            font-weight:600;

        }

        .footer-text{

            text-align:center;

            margin-top:20px;

            color:#6c757d;

            font-size:14px;

        }

    </style>

    {% block css %}
    {% endblock %}

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <div class="logo">

            <i class="bi bi-shield-lock-fill"></i>

        </div>

        <h2 class="login-title">

            AI Resume Screening

        </h2>

        <p class="login-subtitle">

            Administrator Panel

        </p>

        {% block content %}

        {% endblock %}

        <div class="footer-text">

            © 2026 AI Resume Screening System

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block js %}
{% endblock %}

</body>

</html>
