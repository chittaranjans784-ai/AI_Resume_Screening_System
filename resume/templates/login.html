{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Resume Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/login.css' %}">

</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-lg-5 col-md-7">

            <div class="card">

                <div class="card-body p-5">

                    <h2 class="text-center mb-2">
                        🤖 AI Resume Screening
                    </h2>

                    <p class="text-center text-light mb-4">
                        Welcome Back! Login to Continue
                    </p>

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="text-white mb-2">
                                Email
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Your Email"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="text-white mb-2">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter Password"
                                required>

                        </div>
                        

                        <div class="text-end mb-3">

                            <a href="{% url 'forgot_password' %}">

                                Forgot Password?

                            </a>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            🚀 Login

                        </button>

                    </form>

                    <hr class="my-4 text-light">

                    <p class="text-center text-light">

                        Don't have an account?

                        <a href="{% url 'register' %}" class="text-warning fw-bold text-decoration-none">

                            Register Now

                        </a>

                    </p>

                    <p class="text-center mt-3">

                            <a href="{% url 'admin_login' %}"
                                    class="text-info fw-bold text-decoration-none">

                                        👨‍💼 Admin Login

                            </a>

                    </p>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
